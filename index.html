<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Trainer</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa;
    text-align: center;
    padding: 20px;
  }
  h1 { color: #333; }
  .hidden { display: none; }
  .progress {
    width: 80%;
    height: 20px;
    background: #ddd;
    margin: 10px auto;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff4d4d, #ffa64d, #4dff4d);
    transition: width 0.5s;
  }
  .circle-progress {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 6px solid #ccc;
    margin: 10px auto;
    position: relative;
  }
  .circle-progress::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(red 0%, orange 33%, yellow 66%, green 100%);
    clip-path: polygon(50% 50%, 100% 0, 100% 100%, 0 100%, 0 0);
    transform: rotate(-90deg);
    mask: radial-gradient(closest-side, transparent 75%, black 76%);
    transition: background 0.5s;
  }
  input, select, button {
    font-size: 16px;
    margin: 5px;
    padding: 6px 10px;
  }
  #result { font-weight: bold; margin: 10px; }
</style>
</head>
<body>

<h1>Spelling Trainer</h1>

<div id="fileSelector">
  <p>Choose a word list:</p>
  <select id="predefinedSelect">
    <option value="">-- Select predefined list --</option>
    <option value="set1.csv">Set 1</option>
    <option value="set2.csv">Set 2</option>
    <option value="set3.csv">Set 3</option>
  </select>
  <p>Or upload your own CSV:</p>
  <input type="file" id="csvFile" accept=".csv">
</div>

<div id="modeSelector" class="hidden">
  <button onclick="startGame('training')">Training Mode</button>
  <button onclick="startGame('test')">Test Mode</button>
</div>

<div id="game" class="hidden">
  <div class="progress"><div id="progressBar" class="progress-fill"></div></div>
  <div class="circle-progress" id="circleProgress"></div>
  <h3 id="hebrewWord"></h3>
  <input type="text" id="answer" placeholder="Type the English word">
  <button id="submitBtn" onclick="submitAnswer()">Submit</button>
  <div id="result"></div>
</div>

<button id="startOverBtn" class="hidden" onclick="startOver()">Start Over</button>

<script>
let words = [];
let currentIndex = 0;
let correctCount = {};
let mode = '';
let mastered = new Set();
let startTime;

document.getElementById('predefinedSelect').addEventListener('change', e => {
  const file = e.target.value;
  if (file) {
    fetch(file)
      .then(res => res.text())
      .then(loadCSVData);
  }
});

document.getElementById('csvFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = evt => loadCSVData(evt.target.result);
    reader.readAsText(file);
  }
});

function loadCSVData(data) {
  words = data.split('\n').map(l => l.trim().split(',')).filter(a => a.length === 2);
  document.getElementById('fileSelector').classList.add('hidden');
  document.getElementById('modeSelector').classList.remove('hidden');
}

function startGame(selectedMode) {
  mode = selectedMode;
  currentIndex = 0;
  correctCount = {};
  mastered.clear();
  startTime = Date.now();
  document.getElementById('modeSelector').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('startOverBtn').classList.remove('hidden');
  showWord();
}

function showWord() {
  if (mode === 'training') {
    const remaining = words.filter(([h, e]) => !mastered.has(e));
    if (!remaining.length) {
      document.getElementById('hebrewWord').textContent = '🎉 All words mastered!';
      document.getElementById('answer').classList.add('hidden');
      document.getElementById('submitBtn').classList.add('hidden');
      return;
    }
    const randomIndex = Math.floor(Math.random() * remaining.length);
    [hebrew, english] = remaining[randomIndex];
  } else {
    if (currentIndex >= words.length) return showResults();
    [hebrew, english] = words[currentIndex];
  }
  document.getElementById('hebrewWord').textContent = hebrew;
  const answerInput = document.getElementById('answer');
  answerInput.value = '';
  if (!answerInput.classList.contains('hidden')) {
    answerInput.focus();
  }
  updateProgress();
}

function updateProgress() {
  const total = words.length;
  const done = (mode === 'training') ? mastered.size : currentIndex;
  document.getElementById('progressBar').style.width = `${(done / total) * 100}%`;

  const word = words[currentIndex]?.[1];
  const attempts = correctCount[word] || 0;
  const circle = document.getElementById('circleProgress');
  const colors = ['red', 'orange', 'green'];
  circle.style.borderColor = colors[Math.min(attempts, 2)];
}

function submitAnswer() {
  const answer = document.getElementById('answer').value.trim().toLowerCase();
  const [hebrew, english] = (mode === 'training')
    ? words.find(([h, e]) => h === document.getElementById('hebrewWord').textContent)
    : words[currentIndex];
  
  if (!answer) return;

  if (answer === english.toLowerCase()) {
    correctCount[english] = (correctCount[english] || 0) + 1;
    if (mode === 'training') {
      if (correctCount[english] >= 3) mastered.add(english);
    }
    document.getElementById('result').textContent = '✅ Correct!';
  } else {
    document.getElementById('result').textContent = `❌ Incorrect. Correct: ${english}`;
    correctCount[english] = 0;
  }

  setTimeout(() => {
    document.getElementById('result').textContent = '';
    if (mode === 'training') {
      showWord();
    } else {
      currentIndex++;
      if (currentIndex < words.length) showWord();
      else showResults();
    }
  }, 1000);
}

function showResults() {
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  const score = Object.keys(correctCount).filter(e => correctCount[e] > 0).length;
  document.getElementById('game').innerHTML =
    `<h2>Test Completed!</h2><p>Score: ${score}/${words.length}</p><p>Time: ${elapsed} sec</p>`;
}

function startOver() {
  document.location.reload();
}

document.getElementById('answer').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    submitAnswer();
  }
});
</script>

</body>
</html>
