<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Trainer</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary-bg: #667eea;
    --secondary-bg: #764ba2;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    text-align: center;
    padding: 20px;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 30px;
    max-width: 600px;
    width: 90%;
    margin-top: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }

  h1 { color: #333; margin-bottom: 20px; }
  
  .hidden { display: none !important; }

  /* Selection Box Styles */
  .list-container {
    text-align: left;
    background: #f8f9fa;
    padding: 15px;
    border-radius: 12px;
    margin: 20px 0;
    max-height: 200px;
    overflow-y: auto;
    border: 2px solid #eee;
  }

  .list-item {
    display: flex;
    align-items: center;
    padding: 8px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
  }

  .list-item:last-child { border-bottom: none; }
  .list-item input { margin-right: 12px; transform: scale(1.2); }

  /* Buttons */
  button {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    transition: all 0.2s;
    margin: 10px 5px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
  button:active { transform: translateY(0); }

  #giveUpBtn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }

  /* Game Elements */
  #hebrewWord { font-size: 42px; margin: 20px 0; color: #222; }
  
  #answer {
    font-size: 20px;
    padding: 12px;
    width: 80%;
    border-radius: 8px;
    border: 2px solid #ddd;
    margin-bottom: 10px;
    text-align: center;
  }

  .progress-container { margin: 20px 0; }
  .progress-bar {
    width: 100%;
    height: 12px;
    background: #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    transition: width 0.4s ease;
  }

  .circle-progress {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 5px solid #667eea;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 15px;
  }

  #result { font-weight: bold; font-size: 18px; margin-top: 15px; min-height: 40px; }
  .emoji-large { font-size: 40px; display: block; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="container">
  <h1>Spelling Trainer</h1>

  <div id="fileSelector">
    <p>Select word lists to practice:</p>
    <div id="csvCheckboxes" class="list-container">
      Fetching lists...
    </div>
    <button onclick="loadSelectedCSVs()">Load Selected</button>
    <p style="font-size: 12px; color: #666;">- OR -</p>
    <input type="file" id="csvFile" accept=".csv">
  </div>

  <div id="modeSelector" class="hidden">
    <h3>Words Loaded!</h3>
    <p id="wordCountLabel"></p>
    <button onclick="startGame('training')">Training Mode (3x per word)</button>
    <button onclick="startGame('test')">Test Mode (1x per word)</button>
  </div>

  <div id="game" class="hidden">
    <div class="progress-container">
      <div id="progressText" style="margin-bottom:5px; font-size: 14px;">Progress: 0/0</div>
      <div class="progress-bar"><div id="progressBar" class="progress-fill"></div></div>
    </div>
    
    <div class="circle-progress" id="circleProgress">0/3</div>
    
    <h2 id="hebrewWord"></h2>
    <input type="text" id="answer" placeholder="Type in English..." autofocus>
    <br>
    <button onclick="submitAnswer()">Submit</button>
    <button id="giveUpBtn" onclick="giveUp()">I Don't Know</button>
    
    <div id="result"></div>
  </div>

  <button id="startOverBtn" class="hidden" onclick="location.reload()">Start Over</button>
</div>

<script>
let words = [];
let currentIndex = 0;
let correctCount = {};
let mode = '';
let mastered = new Set();
let startTime;
let currentEnglish = '';

// 1. DISCOVER FILES
async function discoverFiles() {
  const container = document.getElementById('csvCheckboxes');
  try {
    const response = await fetch('words/list.json');
    if (!response.ok) throw new Error();
    const files = await response.json();
    
    container.innerHTML = ''; 
    files.forEach(file => {
      const label = document.createElement('label');
      label.className = 'list-item';
      label.innerHTML = `<input type="checkbox" value="${file}"> ${file.replace('.csv', '')}`;
      container.appendChild(label);
    });
  } catch (e) {
    container.innerHTML = '<p style="color:red">Note: words/list.json not found.<br>Use the file uploader below.</p>';
  }
}
discoverFiles();

// 2. LOAD FILES
async function loadSelectedCSVs() {
  const checked = document.querySelectorAll('#csvCheckboxes input:checked');
  const files = Array.from(checked).map(c => c.value);
  
  if (files.length === 0) return alert("Please select at least one list!");

  try {
    const results = await Promise.all(
      files.map(async (f) => {
        const url = `words/${f}`;
        const res = await fetch(url);
        if (!res.ok) {
           // This will tell you EXACTLY which URL failed
           throw new Error(`Could not find file at: ${window.location.href}${url}`);
        }
        return res.text();
      })
    );
    parseCSVData(results.join('\n'));
  } catch (err) {
    alert(err.message);
    console.error(err);
  }
}

document.getElementById('csvFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = evt => parseCSVData(evt.target.result);
    reader.readAsText(file);
  }
});

function parseCSVData(data) {
  words = data.split('\n')
    .map(l => l.trim().split(','))
    .filter(a => a.length >= 2);
  
  if (words.length === 0) return alert("No valid words found!");

  document.getElementById('fileSelector').add('hidden'); // Simplified class management
  document.getElementById('fileSelector').style.display = "none";
  document.getElementById('modeSelector').classList.remove('hidden');
  document.getElementById('wordCountLabel').textContent = `${words.length} words found.`;
}

// 3. GAME LOGIC
function startGame(selectedMode) {
  mode = selectedMode;
  currentIndex = 0;
  mastered.clear();
  correctCount = {};
  startTime = Date.now();
  
  document.getElementById('modeSelector').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('startOverBtn').classList.remove('hidden');
  showWord();
}

function showWord() {
  let hebrew;
  if (mode === 'training') {
    const pool = words.filter(w => !mastered.has(w[1]));
    if (pool.length === 0) return finishGame();
    const pick = pool[Math.floor(Math.random() * pool.length)];
    hebrew = pick[0];
    currentEnglish = pick[1];
  } else {
    if (currentIndex >= words.length) return finishGame();
    hebrew = words[currentIndex][0];
    currentEnglish = words[currentIndex][1];
  }

  document.getElementById('hebrewWord').textContent = hebrew;
  document.getElementById('answer').value = '';
  document.getElementById('answer').focus();
  updateUI();
}

function submitAnswer() {
  const userAns = document.getElementById('answer').value.trim().toLowerCase();
  const target = currentEnglish.toLowerCase();
  const resDiv = document.getElementById('result');

  if (userAns === target) {
    correctCount[currentEnglish] = (correctCount[currentEnglish] || 0) + 1;
    resDiv.innerHTML = '<span class="emoji-large">✅</span> Correct!';
    
    if (mode === 'training' && correctCount[currentEnglish] >= 3) {
      mastered.add(currentEnglish);
      confetti({ particleCount: 50, spread: 60 });
    }
  } else {
    correctCount[currentEnglish] = 0;
    resDiv.innerHTML = `<span class="emoji-large">❌</span> Wrong! It is: <strong>${currentEnglish}</strong>`;
  }

  setTimeout(() => {
    resDiv.innerHTML = '';
    if (mode === 'test') currentIndex++;
    showWord();
  }, 1800);
}

function giveUp() {
  document.getElementById('result').innerHTML = `The answer is: <strong>${currentEnglish}</strong>`;
  correctCount[currentEnglish] = 0;
  setTimeout(() => {
    if (mode === 'test') currentIndex++;
    showWord();
    document.getElementById('result').innerHTML = '';
  }, 2500);
}

function updateUI() {
  const total = words.length;
  const done = mode === 'training' ? mastered.size : currentIndex;
  const pct = (done / total) * 100;
  
  document.getElementById('progressBar').style.width = `${pct}%`;
  document.getElementById('progressText').textContent = `Words: ${done} / ${total}`;
  
  const count = correctCount[currentEnglish] || 0;
  document.getElementById('circleProgress').textContent = mode === 'training' ? `${count}/3` : `${currentIndex + 1}`;
}

function finishGame() {
  const time = ((Date.now() - startTime) / 1000).toFixed(0);
  document.getElementById('game').innerHTML = `<h2>Complete! 🎉</h2><p>You finished in ${time} seconds.</p>`;
  confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
}

document.getElementById('answer').addEventListener('keypress', e => {
  if (e.key === 'Enter') submitAnswer();
});
</script>
</body>
</html>
