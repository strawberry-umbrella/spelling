<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Trainer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Spelling Trainer</h1>
            <audio id="background-music" loop>
                <source src="music/background.mp3" type="audio/mp3">
                Your browser does not support the audio element.
            </audio>
            <button id="toggle-music">Toggle Music</button>
        </header>
        <main>
            <section id="loading">
                <h2>Load Your Words</h2>
                <input type="file" id="file-input" multiple accept=".csv">
                <button id="load-btn">Load Words</button>
            </section>
            <section id="training" class="hidden">
                <h2>Training Mode</h2>
                <button id="start-training">Start Training</button>
                <div id="progress" class="hidden">
                    <p>Progress: <span id="progress-tracker">0</span>%</p>
                    <canvas id="confetti-canvas"></canvas>
                </div>
            </section>
            <section id="testing" class="hidden">
                <h2>Test Mode</h2>
                <button id="start-test">Start Test</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Spelling Trainer</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
