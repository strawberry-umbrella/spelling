<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Trainer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Spelling Trainer</h1>
    </header>
    <main>
        <div id="gameModes">
            <h2>Select Game Mode</h2>
            <button onclick="startGame('practice')">Practice Mode</button>
            <button onclick="startGame('test')">Test Mode</button>
        </div>
        <div id="csvLoader">
            <h2>Load Words</h2>
            <input type="file" id="fileInput" accept="text/csv">
            <button onclick="loadCSV()">Load CSV</button>
        </div>
        <div id="progressTracker">
            <h2>Progress Tracker</h2>
            <p id="progress">0%</p>
        </div>
    </main>
    <audio id="backgroundMusic" controls>
        <source src="music.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>
    <script src="script.js"></script>
</body>
</html>
